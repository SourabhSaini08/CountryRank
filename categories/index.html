  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Ranking Categories — CountryRank</title>
  <meta name="description" content="Browse all country ranking categories: GDP, population, happiness, passport power, military, corruption, literacy and more. Click any to see 195 countries ranked.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://mycountryrank.com/categories/">
  <meta property="og:title" content="All Ranking Categories — CountryRank">
  <meta property="og:description" content="Browse all country ranking categories on CountryRank.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/images/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main id="main">
    <div class="container">

      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../">Home</a><span aria-hidden="true"> › </span>
        <span aria-current="page">Categories</span>
      </nav>

      <h1 class="section-title">All Ranking Categories</h1>

      <div style="margin-bottom:20px">
        <label for="cat-dropdown" class="select-label">Jump directly to a category:</label>
        <select id="cat-dropdown" class="full-select" style="max-width:480px" aria-label="Select a ranking category">
          <option value="">— Select a Category —</option>
        </select>
      </div>

      <div class="list-toolbar">
        <div class="search-box">
          <svg class="search-icon" aria-hidden="true" width="16" height="16" fill="none" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="search" id="filter-input" placeholder="Filter categories…" aria-label="Filter categories" autocomplete="off">
        </div>
        <span class="result-count" id="result-count"></span>
      </div>

      <div id="categories-grid" class="item-grid" aria-label="Category list"></div>

      <h2 class="section-title" style="margin-top:40px">Coming Soon</h2>
      <p style="color:var(--color-text-muted);margin-bottom:20px;font-size:.9rem">
        These categories are planned. Data will be added in future updates.
      </p>
      <div id="extra-categories-grid" class="item-grid" aria-label="Upcoming categories"></div>

    </div>
  </main>

  <script src="../js/theme.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
  <script>
    pageInit("categories");
    Search.initHeader();

    const icons = {
      "gdp-nominal":"💰","gdp-per-capita":"💵","population":"👥",
      "life-expectancy":"❤️","human-development-index":"🏅",
      "passport-index":"✈️","global-peace-index":"🕊️",
      "corruption-perceptions":"🔍","happiness":"😊",
      "internet-users":"🌐","military-expenditure":"🛡️",
      "literacy-rate":"📚","unemployment-rate":"📉",
      "co2-emissions":"🌿","forest-area":"🌲",
      "crime-index":"🚨","cost-of-living":"🛒","press-freedom":"📰",
      "democracy-index":"🗳️","healthcare-index":"🏥","air-quality":"💨",
      "tourism-arrivals":"✈️","birth-rate":"👶","obesity-rate":"⚖️",
      "gender-equality":"⚖️","renewable-energy":"☀️","education-index":"🎓"
    };

    let allCats = [];

    function render(cats) {
      const grid = document.getElementById("categories-grid");
      document.getElementById("result-count").textContent = cats.length + " categories";
      if (!cats.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No categories match.</div>`;
        return;
      }
      grid.innerHTML = cats.map(cat => `
        <a href="../category.html?id=${cat.id}" class="item-card" aria-label="${cat.name}">
          <div class="item-icon" aria-hidden="true">${icons[cat.id] || "📊"}</div>
          <div>
            <div class="item-name">${cat.name}</div>
            <div class="item-meta">${cat.source.split(" (")[0]}</div>
          </div>
        </a>`).join("");
    }

    loadCategories().then(cats => {
      allCats = cats.slice().sort((a,b) => a.name.localeCompare(b.name));
      render(allCats);

      const sel = document.getElementById("cat-dropdown");
      allCats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id; opt.textContent = c.name;
        sel.appendChild(opt);
      });
      sel.addEventListener("change", () => {
        if (sel.value) location.href = `../category.html?id=${sel.value}`;
      });
    });

    loadExtraCategories().then(extras => {
      const grid = document.getElementById("extra-categories-grid");
      grid.innerHTML = extras.map(cat => `
        <div class="item-card" style="opacity:.65;cursor:default" aria-label="${cat.name} - coming soon">
          <div class="item-icon" aria-hidden="true">${icons[cat.id] || "📊"}</div>
          <div>
            <div class="item-name">${cat.name}</div>
            <div class="item-meta">Coming soon</div>
          </div>
        </div>`).join("");
    }).catch(() => {});

    document.getElementById("filter-input").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      render(q ? allCats.filter(c =>
        c.name.toLowerCase().includes(q) || c.description.toLowerCase().includes(q)
      ) : allCats);
    });
  </script>
</body>
</html>
